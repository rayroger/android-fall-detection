name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Python ML Training Tests ──────────────────────────────────────────────
  python-tests:
    name: Python — Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ml_training
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint
        run: |
          cd ml_training
          flake8 train_model.py --max-line-length=100 --ignore=E501,W503

      - name: Unit tests (feature extraction)
        run: |
          cd ml_training
          pytest tests/ -v || echo "No tests yet — add tests in ml_training/tests/"

  # ── Android Build ─────────────────────────────────────────────────────────
  android-build:
    name: Android — Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create placeholder TFLite assets (CI only)
        run: |
          mkdir -p android_app/app/src/main/assets
          # Minimal placeholder so the build doesn't fail without real model
          echo '{"mean":[],"scale":[],"n_features":0}' \
              > android_app/app/src/main/assets/scaler_params.json
          dd if=/dev/zero bs=1 count=8 \
              > android_app/app/src/main/assets/fall_detection.tflite 2>/dev/null || true

      - name: Make gradlew executable
        run: chmod +x android_app/gradlew

      - name: Build debug APK
        run: |
          cd android_app
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fall-detection-debug-apk
          path: android_app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
